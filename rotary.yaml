esphome:
  name: knob

esp32:
  board: seeed_xiao_esp32c6

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
api:
ota:
  platform: esphome

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true

# Use external component from Git
external_components:
  - source: github://atsukirasan-web/dfrobot_dimmer

dfrobot_visual_encoder:
  id: knob

  on_clockwise:
    then:
      - light.dim_relative:
          id: shelly_light
          relative_brightness: 5%

  on_counter_clockwise:
    then:
      - light.dim_relative:
          id: shelly_light
          relative_brightness: -5%

  on_press:
    then:
      - light.toggle: shelly_light

  on_long_press:
    then:
      - light.turn_on:
          id: shelly_light
          brightness: 100%

light:
  - platform: homeassistant
    id: shelly_light
    entity_id: light.shelly_dimmer

sensor:
  - platform: homeassistant
    id: shelly_brightness
    entity_id: light.shelly_dimmer
    attribute: brightness
    on_value:
      then:
        - lambda: |-
            id(knob).set_led_level(x / 100.0);